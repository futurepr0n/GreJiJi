name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          set -o pipefail
          mkdir -p artifacts/unit
          npm run test:unit 2>&1 | tee artifacts/unit/test.log

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-artifacts
          path: artifacts/unit
          if-no-files-found: ignore

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: |
          set -o pipefail
          mkdir -p artifacts/integration
          npm run test:integration 2>&1 | tee artifacts/integration/test.log

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-artifacts
          path: artifacts/integration
          if-no-files-found: ignore

  e2e:
    name: E2E Transactional Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run end-to-end suite
        run: |
          set -o pipefail
          mkdir -p artifacts/e2e
          npm run test:e2e 2>&1 | tee artifacts/e2e/test.log

      - name: Upload end-to-end artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-artifacts
          path: artifacts/e2e
          if-no-files-found: ignore

  release-gate:
    name: Release Gate Status
    runs-on: ubuntu-latest
    needs:
      - unit
      - integration
      - e2e
    steps:
      - name: Finalize release gate
        run: echo "Release gate passed: unit, integration, and e2e suites are green."
